services:
  # ── Deno backend API ──────────────────────────────────────────────────────
  - type: web
    name: harborwatch-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: 8000
      - key: HARBORWATCH_API_KEY
        generateValue: true   # Render auto-generates a secret on first deploy
      - key: ALLOWED_ORIGIN
        value: https://harborwatch-ui.onrender.com
    disk:
      name: harborwatch-db
      mountPath: /data
      sizeGB: 1

  # ── Vue frontend (static site) ────────────────────────────────────────────
  # IMPORTANT: after first deploy, set VITE_API_BASE to your API service URL,
  # e.g. https://harborwatch-api.onrender.com — then redeploy the frontend.
  - type: web
    name: harborwatch-ui
    runtime: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: ./frontend/dist
    envVars:
      - key: VITE_API_BASE
        value: https://harborwatch-api.onrender.com
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
