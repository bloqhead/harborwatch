services:
  # ── Deno backend API ──────────────────────────────────────────────────────
  - type: web
    name: harborwatch-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: 8000
      - key: HARBORWATCH_API_KEY
        generateValue: true
      - key: ALLOWED_ORIGIN
        value: https://harborwatch-ui.onrender.com
    disk:
      name: harborwatch-db
      mountPath: /data
      sizeGB: 1

  # ── Vue frontend (static site) ────────────────────────────────────────────
  - type: web
    name: harborwatch-ui
    runtime: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: ./frontend/dist
    envVars:
      - key: VITE_API_BASE
        value: https://harborwatch-api.onrender.com
      - key: VITE_UMAMI_SITE_ID
        sync: false  # Set this after Umami is deployed — grab the Site ID from Umami dashboard
      - key: VITE_UMAMI_URL
        value: https://harborwatch-analytics.onrender.com
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  # ── Umami analytics ───────────────────────────────────────────────────────
  # Self-hosted, privacy-friendly analytics. No cookies, no GDPR headaches.
  # After first deploy:
  #   1. Visit https://harborwatch-analytics.onrender.com
  #   2. Log in with admin / umami (CHANGE PASSWORD IMMEDIATELY)
  #   3. Settings → Websites → Add Website → harborwatch-ui.onrender.com
  #   4. Copy the Site ID, set VITE_UMAMI_SITE_ID on harborwatch-ui, redeploy
  - type: web
    name: harborwatch-analytics
    runtime: image
    image:
      url: ghcr.io/umami-software/umami:postgresql-latest
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: harborwatch-analytics-db
          property: connectionString
      - key: APP_SECRET
        generateValue: true

databases:
  - name: harborwatch-analytics-db
    databaseName: harborwatch_analytics
    plan: free
