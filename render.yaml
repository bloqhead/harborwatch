services:
  # ── Deno backend API ──────────────────────────────────────────────────────
  # Only redeploys when backend code or render.yaml changes
  - type: web
    name: harborwatch-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    healthCheckPath: /health
    filter:
      paths:
        - backend/**
        - render.yaml
    envVars:
      - key: PORT
        value: 8000
      - key: HARBORWATCH_API_KEY
        generateValue: true
      - key: ALLOWED_ORIGIN
        value: https://harborwatch-ui.onrender.com
    disk:
      name: harborwatch-db
      mountPath: /data
      sizeGB: 1

  # ── Vue frontend (static site) ────────────────────────────────────────────
  # Only redeploys when frontend code or render.yaml changes
  - type: web
    name: harborwatch-ui
    runtime: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: ./frontend/dist
    filter:
      paths:
        - frontend/**
        - render.yaml
    envVars:
      - key: VITE_API_BASE
        value: https://harborwatch-api.onrender.com
      - key: VITE_UMAMI_SITE_ID
        sync: false
      - key: VITE_UMAMI_URL
        value: https://harborwatch-analytics.onrender.com
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  # ── Umami analytics ───────────────────────────────────────────────────────
  - type: web
    name: harborwatch-analytics
    runtime: image
    image:
      url: ghcr.io/umami-software/umami:postgresql-latest
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: harborwatch-analytics-db
          property: connectionString
      - key: APP_SECRET
        generateValue: true

databases:
  - name: harborwatch-analytics-db
    databaseName: harborwatch_analytics
    plan: free
